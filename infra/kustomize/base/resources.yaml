apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferroui-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ferroui-engine
  template:
    metadata:
      labels:
        app: ferroui-engine
    spec:
      containers:
        - name: engine
          image: ferroui-engine
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: ferroui-config
            - secretRef:
                name: ferroui-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: ferroui-engine
spec:
  selector:
    app: ferroui-engine
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000
  type: ClusterIP