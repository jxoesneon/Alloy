name: FerroUI Main CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_DEFAULT: "25"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build & Test (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node-version: ["25"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm -r --if-present run build
      - name: Test with coverage
        run: pnpm -r --if-present run test -- --coverage --coverage.provider=v8
      - name: Lint
        run: pnpm -r --if-present run lint
      - name: Type check
        run: pnpm run typecheck
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == env.NODE_VERSION_DEFAULT
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: "**/coverage"
          retention-days: 7

  coverage-gate:
    name: Coverage Gate
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm -r --if-present run build
      - name: Run coverage with thresholds
        run: |
          pnpm -r --if-present run test -- \
            --coverage \
            --coverage.provider=v8 \
            --coverage.thresholds.lines=80 \
            --coverage.thresholds.functions=80 \
            --coverage.thresholds.branches=70 \
            --coverage.thresholds.statements=80

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm -r --if-present run build
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: ferroui-sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: ferroui-sbom.json
          retention-days: 90

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high

  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker images
        run: |
          docker build -t ferroui-engine:test -f packages/engine/Dockerfile .
          docker build -t ferroui-registry:test -f packages/registry/Dockerfile .
          docker build -t ferroui-web:test -f apps/web/Dockerfile .
      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ferroui-engine:test'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
      - name: Upload Trivy (image)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'
      - name: Run Trivy (fs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'HIGH,CRITICAL'
          skip-dirs: 'node_modules,packages/*/node_modules,apps/*/node_modules'
      - name: Upload Trivy (fs)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Build web app
        run: pnpm -F web build
      - name: Run Playwright tests
        run: pnpm exec playwright test --config tests/e2e/playwright.config.ts
        env:
          E2E_BASE_URL: http://localhost:3000
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build packages
        run: pnpm -r --if-present run build
      - name: Run integration tests
        run: pnpm run test:integration
        env:
          JWT_SECRET: "test-secret-min32chars-padding-here!!"
          NODE_ENV: test
